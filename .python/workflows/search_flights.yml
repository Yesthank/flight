name: ✈️ 항공편 검색

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'
    - cron: '0 12 * * *'

jobs:
  search:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install amadeus

      - name: Run flight search
        env:
          AMADEUS_CLIENT_ID: ${{ secrets.AMADEUS_CLIENT_ID }}
          AMADEUS_CLIENT_SECRET: ${{ secrets.AMADEUS_CLIENT_SECRET }}
        run: python flight_search.py index.html

      - name: Deploy to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          mkdir -p deploy
          cp index.html deploy/
          
          cd deploy
          git init
          git checkout -b gh-pages
          git add .
          git commit -m "✈️ 검색 결과 업데이트 $(date +'%Y-%m-%d %H:%M')"
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push -f origin gh-pages
