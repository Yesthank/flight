<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✈️ 5월 항공편 검색 결과</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e17;
    --surface: #121929;
    --surface2: #1a2338;
    --border: #243049;
    --text: #e2e8f0;
    --text-dim: #8b9cc0;
    --accent: #60a5fa;
    --accent-glow: rgba(96, 165, 250, 0.15);
    --green: #34d399;
    --amber: #fbbf24;
    --orange: #fb923c;
    --pink: #f472b6;
    --radius: 14px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* 배경 효과 */
  body::before {
    content: '';
    position: fixed;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(circle at 30% 20%, rgba(96,165,250,0.04) 0%, transparent 50%),
                radial-gradient(circle at 70% 80%, rgba(244,114,182,0.03) 0%, transparent 50%);
    z-index: -1;
    animation: bgShift 20s ease-in-out infinite alternate;
  }

  @keyframes bgShift {
    0% { transform: translate(0, 0); }
    100% { transform: translate(-5%, -3%); }
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
  }

  /* 헤더 */
  .header {
    text-align: center;
    margin-bottom: 3rem;
    padding: 2.5rem 2rem;
    background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%);
    border: 1px solid var(--border);
    border-radius: 20px;
    position: relative;
    overflow: hidden;
  }

  .header::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--pink), var(--amber));
  }

  .header h1 {
    font-size: 2rem;
    font-weight: 900;
    letter-spacing: -0.02em;
    margin-bottom: 0.5rem;
    background: linear-gradient(135deg, var(--accent), var(--pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .header .subtitle {
    color: var(--text-dim);
    font-size: 0.95rem;
    font-weight: 300;
  }

  .meta-bar {
    display: flex;
    justify-content: center;
    gap: 2rem;
    margin-top: 1.2rem;
    flex-wrap: wrap;
  }

  .meta-item {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    color: var(--text-dim);
    background: var(--bg);
    padding: 0.4rem 1rem;
    border-radius: 20px;
    border: 1px solid var(--border);
  }

  .meta-item span { color: var(--accent); font-weight: 600; }

  /* 조건 요약 */
  .conditions {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 0.8rem;
    margin-bottom: 2.5rem;
  }

  .cond-chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.8rem 1rem;
    text-align: center;
    font-size: 0.85rem;
  }

  .cond-chip .cond-label {
    color: var(--text-dim);
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 0.2rem;
  }

  .cond-chip .cond-value {
    font-weight: 700;
    color: var(--text);
  }

  /* 날짜 그룹 */
  .date-group {
    margin-bottom: 2.5rem;
  }

  .date-header {
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 1.2rem;
    padding-bottom: 0.8rem;
    border-bottom: 2px solid var(--border);
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .date-icon { font-size: 1.1rem; }

  /* 항공편 그리드 */
  .flight-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 1rem;
  }

  /* 항공편 카드 */
  .flight-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    animation: cardIn 0.5s ease-out both;
  }

  .flight-card:hover {
    /* hover는 .flight-card-link에서 처리 */
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.9rem 1.1rem;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }

  .route-badge {
    font-weight: 700;
    font-size: 0.95rem;
    color: var(--accent);
  }

  .nights-badge {
    font-size: 0.78rem;
    font-weight: 600;
    background: rgba(96,165,250,0.12);
    color: var(--accent);
    padding: 0.25rem 0.7rem;
    border-radius: 20px;
  }

  .card-body {
    padding: 1rem 1.1rem;
    display: flex;
    flex-direction: column;
    gap: 0.7rem;
  }

  .flight-row {
    display: grid;
    grid-template-columns: 52px 1fr auto;
    align-items: center;
    gap: 0.6rem;
  }

  .direction-label {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    color: var(--text-dim);
    background: var(--bg);
    padding: 0.2rem 0.5rem;
    border-radius: 4px;
    text-align: center;
  }

  .flight-info {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .flight-num {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    font-size: 0.9rem;
    color: var(--text);
  }

  .airline-name {
    font-size: 0.78rem;
    color: var(--text-dim);
  }

  .time-block {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-family: 'JetBrains Mono', monospace;
  }

  .time {
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--text);
  }

  .arrow {
    color: var(--text-dim);
    font-size: 0.8rem;
  }

  .card-bottom {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    padding: 0.9rem 1.1rem;
    border-top: 1px solid var(--border);
    background: var(--surface2);
  }

  .price-total {
    font-size: 1.15rem;
    font-weight: 900;
    color: var(--text);
  }

  .price-label {
    font-size: 0.7rem;
    font-weight: 400;
    color: var(--text-dim);
    margin-left: 0.3rem;
  }

  .price-pp {
    font-size: 0.8rem;
    color: var(--green);
    font-weight: 600;
    margin-top: 0.15rem;
  }

  .seats-badge {
    font-size: 0.75rem;
    font-weight: 600;
    padding: 0.3rem 0.8rem;
    border-radius: 20px;
    white-space: nowrap;
  }

  /* 카드 링크 래퍼 */
  .flight-card-link {
    text-decoration: none;
    color: inherit;
    display: block;
    animation: cardIn 0.5s ease-out both;
  }

  .flight-card-link:hover .flight-card {
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.3);
    border-color: var(--accent);
  }

  .flight-card-link:hover .sky-link {
    opacity: 1;
    color: var(--accent);
  }

  .card-bottom-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 0.4rem;
  }

  .sky-link {
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--text-dim);
    opacity: 0.6;
    transition: opacity 0.2s, color 0.2s;
    white-space: nowrap;
  }

  /* 카드 hover 제거 (링크 래퍼에서 처리) */
  .flight-card {
    transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
  }

  .badge-cheap {
    background: rgba(52,211,153,0.12);
    color: var(--green);
  }

  .badge-mid {
    background: rgba(251,191,36,0.12);
    color: var(--amber);
  }

  .badge-normal {
    background: rgba(251,146,60,0.12);
    color: var(--orange);
  }

  /* 빈 상태 */
  .empty-state {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--text-dim);
  }

  .empty-icon {
    font-size: 3rem;
    margin-bottom: 1rem;
    opacity: 0.5;
  }

  .empty-sub {
    font-size: 0.85rem;
    margin-top: 0.5rem;
    opacity: 0.7;
  }

  /* 푸터 */
  .footer {
    text-align: center;
    padding: 2rem 0;
    margin-top: 2rem;
    border-top: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 0.78rem;
  }

  /* 반응형 */
  @media (max-width: 640px) {
    .container { padding: 1rem; }
    .header h1 { font-size: 1.5rem; }
    .flight-grid { grid-template-columns: 1fr; }
    .meta-bar { gap: 0.5rem; }
    .flight-row { grid-template-columns: 48px 1fr; }
    .time-block { grid-column: 2; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>✈️ 5월 항공편 검색</h1>
    <p class="subtitle">김해·대구 출발 → 홍콩·상하이 직항 | 4인 기준</p>
    <div class="meta-bar">
      <div class="meta-item">🕐 업데이트 <span>2026-02-25 06:00</span></div>
      <div class="meta-item">🔍 API 호출 <span>16회</span></div>
      <div class="meta-item">📋 결과 <span>0건</span></div>
    </div>
  </div>

  <div class="conditions">
    <div class="cond-chip">
      <div class="cond-label">출발지</div>
      <div class="cond-value">김해 · 대구</div>
    </div>
    <div class="cond-chip">
      <div class="cond-label">도착지</div>
      <div class="cond-value">홍콩 · 상하이</div>
    </div>
    <div class="cond-chip">
      <div class="cond-label">조건</div>
      <div class="cond-value">직항 · 4인석</div>
    </div>
    <div class="cond-chip">
      <div class="cond-label">예산</div>
      <div class="cond-value">1인 55만원 미만</div>
    </div>
  </div>

  
        <div class="empty-state">
            <div class="empty-icon">✈️</div>
            <p>조건에 맞는 항공편이 없습니다.</p>
            <p class="empty-sub">가격 조건을 완화하거나 다른 날짜를 시도해보세요.</p>
        </div>
        

  <div class="footer">
    <p>Amadeus API 기반 자동 검색 | 가격은 검색 시점 기준이며 변동될 수 있습니다</p>
  </div>
</div>
</body>
</html>
